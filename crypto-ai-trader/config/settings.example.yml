app:
  name: "Aiterra v1.1.0"
  port: 8888
  host: "127.0.0.1"    # localhost only by default; set "0.0.0.0" to expose over LAN
  open_browser: true
  log_level: "INFO"

ai:
  default_model: "hybrid"   # options: claude, rule_based, ml, hybrid, multi_model
  claude:
    api_key: ""             # ใส่ Claude API key ที่นี่
    model: "claude-sonnet-4-6"  # claude-opus-4-8 | claude-sonnet-4-6 | claude-haiku-4-5-20251001
    max_tokens: 2048            # agentic loop: tool use + multi-step reasoning needs headroom
  openai:
    api_key: ""             # GPT-4 key สำหรับ multi-model consensus (ไม่ใส่ก็ได้)
  gemini:
    api_key: ""             # Gemini key สำหรับ multi-model consensus (ไม่ใส่ก็ได้)
  rule_based:
    enabled: true
  ml:
    enabled: true
    min_training_samples: 30  # เริ่ม train เมื่อมี trade ครบจำนวนนี้
    retrain_interval: 50      # retrain ทุก N trades
  hourly_train_interval: 3600  # ดึงข้อมูลจริงจาก Binance ทุก N วินาที (3600 = 1 ชั่วโมง)

exchanges:
  active: "binance"         # live exchange to trade on when mode=live
                            # options: binance | binance_th | bitkub | okx
  binance:
    api_key: ""
    api_secret: ""
    enabled: false
    testnet: false
  binance_th:
    api_key: ""
    api_secret: ""
    enabled: false
    # Binance TH trades THB pairs: BTC/THB, ETH/THB, BNB/THB, XRP/THB, SOL/THB
    # API uses /api/v1/ endpoints (different from global Binance /api/v3/)
  bitkub:
    api_key: ""
    api_secret: ""
    enabled: false
  okx:
    api_key: ""
    api_secret: ""
    passphrase: ""
    enabled: false
    testnet: false
  demo:
    enabled: true
    virtual_balance_usdt: 10000.0   # USDT เสมือน
    virtual_balance_thb: 350000.0   # THB เสมือน (สำหรับ Bitkub)
    data_source: "binance"          # ดึงข้อมูลตลาดจาก exchange ไหน

backtest:
  fee_pct: 0.0            # Binance TH: 0% สำหรับคู่ /THB (BTC/THB, ETH/THB ฯลฯ) — ต้อง KYC ก่อน
                          # ถ้าใช้คู่ /USDT หรือยังไม่ KYC: เปลี่ยนเป็น 0.001 (0.1%)
  slippage_pct: 0.0005    # Market-impact slippage per fill (0.05%)

trading:
  dry_run: false        # true = log orders but never send to exchange
  mode: "demo"          # demo | live
  symbols:
    - "BTC/USDT"
    - "ETH/USDT"
    - "BNB/USDT"
    - "SOL/USDT"
    - "XRP/USDT"
  # Binance TH symbols (ใช้เมื่อเปิด binance_th):
  # - "BTC/THB"
  # - "ETH/THB"
  # - "BNB/THB"
  # - "XRP/THB"
  # - "SOL/THB"
  base_currency: "USDT"
  max_position_pct: 0.15    # สูงสุด 15% ของพอร์ตต่อ trade
  stop_loss_pct: 0.03       # Stop loss 3%
  take_profit_pct: 0.06     # Take profit 6%
  min_confidence: 0.60      # เทรดเมื่อ AI มั่นใจ >= 60%
  analysis_interval: 300    # วิเคราะห์ทุก 5 นาที (วินาที)
  # Risk Management
  risk_per_trade_pct: 0.02    # ความเสี่ยงต่อ trade = 2% ของพอร์ต
  max_daily_loss_pct: 0.05    # หยุดเทรดถ้าขาดทุนเกิน 5% ต่อวัน
  max_open_trades: 3          # จำนวน trade สูงสุดที่เปิดพร้อมกัน
  # Exit controls
  breakeven_trigger_pct: 0.02 # ย้าย SL → breakeven เมื่อกำไรถึง 2%
  trail_trigger_pct: 0.015    # เริ่ม trailing stop เมื่อกำไรถึง 1.5%
  trail_distance_pct: 0.0     # ระยะ trailing (0 = ปิด)
  max_hold_hours: 24          # ปิด trade อัตโนมัติหลัง 24 ชม. (time-based exit)
  time_exit_stuck_pct: 2.0    # ปิดเฉพาะถ้า drift < 2% (ไม่ใช่ขาขึ้นแรง)
  live_max_budget_usdt: 0     # เพดานเงินจริงสูงสุดที่ AI ใช้ได้ (0 = ไม่จำกัด) — ตั้งผ่านปุ่ม Start Live
  # Trading schedule — หยุดเปิดออเดอร์ใหม่ตามเวลา (ปิดออเดอร์เดิมยังทำงานเสมอ)
  schedule:
    enabled: false
    no_trade_start: "00:00"   # ห้ามเปิดออเดอร์ใหม่ตั้งแต่ (เวลาเครื่อง HH:MM)
    no_trade_end:   "06:00"   # ถึงเวลานี้ (ข้ามเที่ยงคืนได้ เช่น 22:00 → 06:00)
    no_weekend:     false     # true = หยุดเทรดเสาร์-อาทิตย์

strategy:
  primary: "hybrid"         # dca | trend | mean_reversion | hybrid
  dca:
    interval_hours: 24
    amount_usdt: 50.0
    rsi_buy_threshold: 35   # ซื้อเมื่อ RSI ต่ำกว่านี้
    rsi_sell_threshold: 65  # ขายเมื่อ RSI สูงกว่านี้
  trend:
    ema_fast: 9
    ema_slow: 21
    ema_signal: 50
  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
  roi_table:              # Time-based take profit: minutes_open → min_profit_%
    "0": 0.06             # Immediately: 6% profit → close
    "300": 0.04           # After 5 min: 4% → close
    "600": 0.025          # After 10 min: 2.5% → close
    "1800": 0.01          # After 30 min: 1% → close
  trailing_stop:
    enabled: false
    pct: 0.02             # Trail 2% below high-water mark
    activate_pct: 0.01    # Start trailing after 1% unrealized profit
  indicators:
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std: 2.0
    atr_period: 14
    vwap_enabled: true

# ── Advanced Risk Management ─────────────────────────────────────────────────
risk:
  max_drawdown_pct:   0.10   # หยุดเทรดถ้า portfolio ลดจาก peak เกิน 10%
  max_daily_loss_pct: 0.05   # หยุดเทรดถ้าขาดทุนเกิน 5% ต่อวัน
  max_portfolio_heat: 0.20   # สูงสุด 20% ของ portfolio เป็น open risk
  max_position_pct:   0.10   # สูงสุด 10% ของ portfolio ต่อ 1 position
  # Correlation guard (F3.2): บล็อก BUY ที่สัมพันธ์กับ position ที่ถืออยู่สูงเกินไป
  max_correlation:    0.80   # บล็อกถ้า avg correlation กับ positions ที่ถือ > ค่านี้
  correlation_guard_enabled: true

# ── Smart Position Sizing (Kelly Criterion) ────────────────────────────────
position_sizer:
  kelly_fraction:    0.25   # Fractional Kelly (0.25 = 25% of full Kelly)
                            # ▶ งบน้อย (<5,000 THB): ตั้งเป็น 1.0 (Full Kelly)
  min_trade_usdt:    10.0   # ขั้นต่ำต่อ trade (ในหน่วย quote currency: USDT หรือ THB)
                            # ▶ Binance TH ขั้นต่ำจริง ~100 THB — ตั้งเป็น 100 ถ้าใช้ THB
  max_trade_usdt:    5000.0 # สูงสุดต่อ trade
                            # ▶ งบน้อย: ตั้งเป็น max 80% ของงบ เช่น 400 สำหรับ 500 THB
  fallback_risk_pct: 0.02   # ใช้ % นี้ของ portfolio เมื่อยังไม่มีประวัติ trade
                            # ▶ งบน้อย: ตั้งเป็น 0.25 (25%) เพื่อให้ออเดอร์ใหญ่พอ
  target_atr_pct:    2.0    # ATR% ที่ถือว่า "ปกติ" (สูงกว่า = ลด size)

# ── Small-Budget Preset (งบ 500–5,000 THB) ─────────────────────────────────
# ปลด comment ด้านล่างและคัดลอกแทนที่ position_sizer + ส่วน trading ที่เกี่ยวข้อง:
#
# position_sizer:
#   kelly_fraction:    1.0     # Full Kelly — จำเป็นสำหรับงบน้อย
#   min_trade_usdt:    100.0   # 100 THB ขั้นต่ำ (Binance TH requirement)
#   max_trade_usdt:    400.0   # สำรองไว้ 100 THB สำหรับค่าธรรมเนียม
#   fallback_risk_pct: 0.25    # 25% ของพอร์ต = 125 THB จาก 500
#   target_atr_pct:    2.0
#
# trading (ส่วนที่ต้องเปลี่ยน):
#   max_open_trades:   1       # เปิดทีละ 1 เท่านั้น
#   max_position_pct:  0.80    # ยอมให้ใช้ 80% ต่อ position
#   stop_loss_pct:     0.05    # SL กว้างขึ้น (crypto volatile)
#   risk_per_trade_pct: 0.05   # ยอมเสี่ยง 5% = 25 THB ต่อ trade
#   max_daily_loss_pct: 0.10   # หยุดถ้าขาดทุน 50 THB/วัน
#   live_max_budget_usdt: 500  # budget cap (หน่วย THB เมื่อใช้ binance_th)

thai:
  sec_api_key: ""           # ลงทะเบียนฟรีที่ api-portal.sec.or.th
  # watch_stocks:           # หุ้นที่ติดตาม (default = SET50 ทั้งหมด)
  #   - "PTT.BK"
  #   - "KBANK.BK"
  # watch_funds:            # กองทุนที่ติดตาม
  #   - "KFSDIV"
  #   - "KT-PRECIOUS"

notifications:
  line:
    channel_id: ""          # LINE Messaging API — Channel ID (จาก LINE Developers Console)
    channel_secret: ""      # Channel Secret (จาก LINE Developers Console)
    user_id: ""             # LINE User ID (ไม่บังคับ — ว่าง = broadcast ทุกคนที่ follow bot)
    enabled: false
  telegram:
    bot_token: ""           # Telegram Bot token
    chat_id: ""
    enabled: false
  notify_on:
    trade_open: true
    trade_close: true
    stop_loss: true
    take_profit: true
    training_complete: false
