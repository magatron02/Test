version: "3.9"

services:
  aiterra:
    build: .
    ports:
      - "8888:8888"
    environment:
      - TRADER_BASE_DIR=/app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
