<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b4d2cc"/>
      <stop offset="100%" stop-color="#346058"/>
    </linearGradient>
    <radialGradient id="b" cx="32%" cy="28%" r="58%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- globe body — evenodd subtracts equatorial + meridian bands, re-fills center -->
  <path fill="url(#a)" fill-rule="evenodd" d="
    M2,50 A48,48 0 1,1 98,50 A48,48 0 1,1 2,50 Z
    M2,50 A48,15 0 1,1 98,50 A48,15 0 1,1 2,50 Z
    M34,50 A16,48 0 1,1 66,50 A16,48 0 1,1 34,50 Z
  "/>
  <!-- depth highlight -->
  <path fill="url(#b)" fill-rule="evenodd" d="
    M2,50 A48,48 0 1,1 98,50 A48,48 0 1,1 2,50 Z
    M2,50 A48,15 0 1,1 98,50 A48,15 0 1,1 2,50 Z
    M34,50 A16,48 0 1,1 66,50 A16,48 0 1,1 34,50 Z
  "/>
</svg>
